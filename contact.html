<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f7ff 0%, #5f8dd3 100%);
            color: #333;
            line-height: 1.6;
        }
        header {
            padding: 20px 30px;
            position: relative;
            z-index: 10;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: linear-gradient(90deg, rgba(117, 177, 207, 0.8) 0%, rgba(19, 54, 122, 0.9) 100%);
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 24px;
            color: white;
            text-decoration: none;
        }

        .logo-icon {
            font-size: 28px;
        }

        .menu {
            display: flex;
            gap: 30px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            padding: 5px 0;
            transition: all 0.3s ease;
        }

        .menu a::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: white;
            transition: width 0.3s ease;
        }

        .menu a:hover::after {
            width: 100%;
        }

        .form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        padding-left: 2em;
        padding-right: 2em;
        padding-bottom: 0.4em;
        background-color: #171717;
        border-radius: 25px;
        transition: 0.4s ease-in-out;
        height: 600px;
        }

        .card {
        background-image: linear-gradient(163deg, #00ff75 0%, #3700ff 100%);
        border-radius: 22px;
        transition: all 0.3s;
        width: 400px;
        height: 600px;
        align-items: center;
        margin-left: 465px;
        }

        .card2 {
        border-radius: 0;
        transition: all 0.2s;
        }

        .card2:hover {
        transform: scale(0.98);
        border-radius: 20px;
        }

        .card:hover {
        box-shadow: 0px 0px 30px 1px rgba(0, 255, 117, 0.3);
        }

        #heading {
        text-align: center;
        margin: 2em;
        color: rgb(255, 255, 255);
        font-size: 1.2em;
        }

        .field {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5em;
        border-radius: 25px;
        padding: 0.6em;
        border: none;
        outline: none;
        color: white;
        background-color: #171717;
        box-shadow: inset 2px 5px 10px rgb(5, 5, 5);
        }

        .input-icon {
        height: 1.3em;
        width: 1.3em;
        fill: white;
        }

        .input-field {
        background: none;
        border: none;
        outline: none;
        width: 100%;
        color: #d3d3d3;
        }

        .form .btn {
        display: flex;
        justify-content: center;
        flex-direction: row;
        margin-top: 1em;
        }

        .button1 {
        padding: 0.5em;
        padding-left: 1.1em;
        padding-right: 1.1em;
        border-radius: 5px;
        margin-right: 0.5em;
        border: none;
        outline: none;
        transition: 0.4s ease-in-out;
        background-color: #252525;
        color: white;
        }

        .button1:hover {
        background-color: black;
        color: white;
        }

        .button2 {
        padding: 0.5em;
        padding-left: 2.3em;
        padding-right: 2.3em;
        border-radius: 5px;
        border: none;
        outline: none;
        transition: 0.4s ease-in-out;
        background-color: #252525;
        color: white;
        }

        .button2:hover {
        background-color: black;
        color: white;
        }

        .button3 {
        margin-bottom: 3em;
        padding: 0.5em;
        border-radius: 5px;
        border: none;
        outline: none;
        transition: 0.4s ease-in-out;
        background-color: #252525;
        color: white;
        }

        .button3:hover {
        background-color: red;
        color: white;
        }
        .social-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 800px;
        }
        .social-icon {
            position: relative;
            width: 80px;
            height: 80px;
            perspective: 1000px;
        }
        
        .icon-box {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: all 0.5s;
            transform-style: preserve-3d;
        }
        
        .icon-box:hover {
            transform: translateY(-10px);
        }
        
        .icon-box::before {
            content: '';
            position: absolute;
            bottom: -50px;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2), transparent);
            filter: blur(15px);
            transform: rotateX(90deg) translateZ(35px) scale(0.85);
            transition: all 0.5s;
            opacity: 0.6;
        }
        
        .icon-box:hover::before {
            opacity: 1;
            bottom: -80px;
            filter: blur(20px);
            width: 90%;
        }
        
        .icon-box i {
            font-size: 40px;
            color: white;
            text-shadow: 0 0 10px currentColor;
        }
        
        /* Individual social media styles */
        .instagram {
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.7);
        }
        
        .linkedin {
            background: #0077B5;
            box-shadow: 0 0 15px rgba(0, 119, 181, 0.7);
        }
        
        .tiktok {
            background: linear-gradient(90deg, #25F4EE, #000000, #FE2C55);
            box-shadow: 0 0 15px rgba(254, 44, 85, 0.7);
        }
        
        .twitter {
            background: #1DA1F2;
            box-shadow: 0 0 15px rgba(29, 161, 242, 0.7);
        }
        
        .facebook {
            background: #4267B2;
            box-shadow: 0 0 15px rgba(66, 103, 178, 0.7);
        }
        
        /* Font Awesome replacement */
        .fa-icon {
            font-size: 36px;
            line-height: 1;
            font-weight: bold;
            text-align: center;
        }
        
        /* Glow animation */
        @keyframes glow {
            0% {
                filter: brightness(1) drop-shadow(0 0 5px currentColor);
            }
            50% {
                filter: brightness(1.3) drop-shadow(0 0 15px currentColor);
            }
            100% {
                filter: brightness(1) drop-shadow(0 0 5px currentColor);
            }
        }
        
        .icon-box:hover i {
            animation: glow 2s infinite;
        }
        .services, .portfolio, .team, .contact {
        padding: 80px 0;
        text-align: center;
        }

        .services h2, .portfolio h2, .team h2, .contact h2 {
            font-size: 2.5em;
            margin-bottom: 40px;
            color: #222;
        }

        .services-grid, .portfolio-grid, .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            text-align: left;
        }

        .service, .portfolio-item, .team-member {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .service h3, .portfolio-item h3, .team-member h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .service p, .team-member p {
            color: #555;
        }

        .portfolio-item img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        /* Instagram Icon Styles */
.insta-icon {
    width: 24px;
    height: 24px;
    position: relative;
    border-radius: 6px;
    background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
    display: inline-flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: all 0.3s ease;
    overflow: hidden;
    vertical-align: middle;
    margin-left: 8px;
}

.insta-icon:hover {
    transform: scale(1.1);
    box-shadow: 0 0 8px rgba(215, 31, 150, 0.6);
}

.insta-icon svg {
    width: 14px;
    height: 14px;
    fill: white;
    z-index: 2;
}

/* Animated glow effect */
.insta-icon::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at center, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
    opacity: 0;
    transition: opacity 0.3s;
}

.insta-icon:hover::before {
    opacity: 0.3;
    animation: rotate 2s linear infinite;
}

@keyframes rotate {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}
    </style>
</head>
